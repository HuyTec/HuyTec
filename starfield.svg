<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 50" width="800" height="50">
<defs>
<style>
@keyframes tw1{0%,100%{opacity:.08}50%{opacity:1}}
@keyframes tw2{0%,100%{opacity:.15}55%{opacity:.9}}
@keyframes tw3{0%,100%{opacity:.05}45%{opacity:.75}}
@keyframes tw4{0%,100%{opacity:.2}60%{opacity:1}}
@keyframes drift1{0%{transform:translateX(0px)}100%{transform:translateX(-800px)}}
@keyframes drift2{0%{transform:translateX(200px)}100%{transform:translateX(-600px)}}
@keyframes drift3{0%{transform:translateX(400px)}100%{transform:translateX(-400px)}}
.a{fill:#F0C040;animation:tw1 2s ease-in-out infinite,drift1 18s linear infinite}
