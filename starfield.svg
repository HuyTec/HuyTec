.c{fill:#ffffff;animation:tw3 1.8s ease-in-out infinite .6s,drift1 28s linear infinite}
.d{fill:#F0C040;animation:tw4 2.5s ease-in-out infinite 1.8s,drift3 20s linear infinite}
.e{fill:#90b8ff;animation:tw1 1.5s ease-in-out infinite .3s,drift2 15s linear infinite}
.f{fill:#ffe080;animation:tw2 3.5s ease-in-out infinite 2s,drift3 24s linear infinite}
</style>
</defs>
